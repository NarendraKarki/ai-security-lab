name: AI Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  bandit-sast:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit scan
        run: bandit -r module-01-llm-threat-modelling/tools/vulnfinbot/ -f json -o bandit-report.json --exit-zero

      - name: Show Bandit results
        run: bandit -r module-01-llm-threat-modelling/tools/vulnfinbot/ -f txt --exit-zero

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  semgrep-sast:
    name: Semgrep AI Security Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep JSON output
        run: semgrep --config module-03-secure-ai-pipeline/configs/semgrep-rules/ai-security-rules.yaml module-01-llm-threat-modelling/tools/vulnfinbot/ --json -o semgrep-report.json || true

      - name: Run Semgrep text output
        run: semgrep --config module-03-secure-ai-pipeline/configs/semgrep-rules/ai-security-rules.yaml module-01-llm-threat-modelling/tools/vulnfinbot/ --text || true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
          if-no-files-found: warn

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [bandit-sast, semgrep-sast]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report

      - name: Download Semgrep report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: semgrep-report

      - name: Print security summary
        run: |
          echo "================================================"
          echo "AI Security Pipeline - Scan Summary"
          echo "================================================"
          echo "BANDIT FINDINGS:"
          python3 -c "
          import json
          with open('bandit-report.json') as f:
            data = json.load(f)
          results = data.get('results', [])
          print(f'  Total issues: {len(results)}')
          for r in results:
            print(f'  [{r[\"issue_severity\"]}] {r[\"test_id\"]}: {r[\"issue_text\"][:60]}')
          "
          echo "SEMGREP FINDINGS:"
          python3 -c "
          import json, os
          if not os.path.exists('semgrep-report.json'):
            print('  No semgrep report found')
          else:
            with open('semgrep-report.json') as f:
              data = json.load(f)
            results = data.get('results', [])
            print(f'  Total issues: {len(results)}')
            for r in results:
              print(f'  [{r[\"extra\"][\"severity\"]}] {r[\"check_id\"].split(\".\")[-1]}')
          "
          echo "================================================"
          echo "Pipeline complete"
          echo "================================================"